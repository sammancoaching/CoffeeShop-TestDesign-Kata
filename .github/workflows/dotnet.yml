name: ".NET CI with dotnet"

on:
  schedule:
    # each fifteenth day of month
    - cron: "0 0 15 * *"
  push:
    paths:
      - 'csharp/**'
      - '.github/workflows/dotnet.yml'
  pull_request:
    paths:
      - 'csharp/**'
      - '.github/workflows/dotnet.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up .NET 8
      uses: actions/setup-dotnet@v4

    - name: Restore dependencies
      run: dotnet restore SammanCoaching.ParameterizedTests.sln
      working-directory: csharp/src

    - name: Build
      run: dotnet build SammanCoaching.ParameterizedTests.sln --configuration Release --no-restore
      working-directory: csharp/src

    - name: Test
      run: dotnet test SammanCoaching.ParameterizedTests.sln --no-restore --verbosity normal
      working-directory: csharp/src
